root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/payment-service ."
bin = "./tmp/payment-service"
full_bin = "./tmp/payment-service"
include_ext = ["go", "tpl", "tmpl", "html", "env"]
exclude_dir = ["tmp", "vendor", ".git", "migrations"]
include_dir = []
exclude_file = []
exclude_regex = ["_test.go"]
delay = 1000
stop_on_error = true
send_interrupt = true
kill_delay = "500ms"

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true